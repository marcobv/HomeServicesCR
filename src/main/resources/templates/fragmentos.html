<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo} + ' | HomeServices CR'">HomeServices CR</title>
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/estilos.css}" rel="stylesheet"/>
</head>
<body>
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-primary-hs" th:href="@{/inicio}">
                <span class="logo-hs">HS</span>
                HomeServices CR
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Alternar navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuPrincipal">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" th:href="@{/inicio}">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/servicios/resultados}">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/cliente/panel}">Panel cliente</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/proveedor/panel}">Panel proveedor</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/panel}">Admin</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-primary-hs btn-sm" th:href="@{/usuarios/login}">Iniciar sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div th:fragment="mensajes" class="container mt-3">
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
</div>

<footer th:fragment="footer" class="bg-primary-hs text-white mt-5 py-4">
    <div class="container text-center small">
        HomeServices CR · Segundo avance de proyecto · Grupo 11 · Universidad Fidélitas
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/app.js}"></script>
</footer>
</body>
</html>
