<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head('Perfil proveedor')}"></head>
<body>
<header th:replace="~{fragmentos :: header}"></header>
<div th:replace="~{fragmentos :: mensajes}"></div>
<main class="container my-5">
    <div class="card border-0 shadow rounded-4 mb-4">
        <div class="card-body p-4 p-lg-5">
            <div class="row g-4">
                <div class="col-md-8">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="avatar-proveedor" th:text="${#strings.substring(proveedor.nombre,0,1)}">C</div>
                        <div>
                            <h1 class="h2 fw-bold text-primary-hs mb-0" th:text="${proveedor.nombre}">Carlos Méndez</h1>
                            <p class="text-muted mb-0" th:text="${proveedor.especialidad + ' · ' + proveedor.ubicacion}">Electricista · Heredia</p>
                            <span class="rating" th:text="'★ ' + ${proveedor.calificacionPromedio} + ' · ' + ${proveedor.serviciosCompletados} + ' servicios completados'">★ 4.9</span>
                        </div>
                    </div>
                    <h2 class="h5 fw-bold">Acerca del proveedor</h2>
                    <p th:text="${proveedor.experiencia}">Experiencia del proveedor.</p>
                </div>
                <div class="col-md-4">
                    <h2 class="h5 fw-bold">Disponibilidad</h2>
                    <div class="d-flex flex-wrap gap-2 mb-4">
                        <span class="badge disponibilidad" th:each="disp : ${disponibilidades}" th:text="${disp.diaSemana + ' ' + disp.horaInicio}">Lun 08:00</span>
                    </div>
                    <a class="btn btn-accent-hs w-100" th:href="@{/servicios/resultados(texto=${proveedor.especialidad})}">Ver servicios disponibles</a>
                </div>
            </div>
        </div>
    </div>

    <section>
        <h2 class="h4 fw-bold text-primary-hs mb-3">Comentarios verificados</h2>
        <div th:if="${#lists.isEmpty(calificaciones)}" class="alert alert-info">Este proveedor aún no tiene comentarios.</div>
        <div class="row g-3">
            <div class="col-md-6" th:each="calificacion : ${calificaciones}">
                <div class="card border-0 shadow-sm h-100 rounded-4">
                    <div class="card-body">
                        <span class="rating" th:text="'★ ' + ${calificacion.puntaje}">★ 5</span>
                        <span class="badge bg-success ms-2" th:if="${calificacion.verificado}">Verificado</span>
                        <p class="mt-2 mb-0" th:text="${calificacion.comentario}">Excelente servicio.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{fragmentos :: footer}"></footer>
</body>
</html>
