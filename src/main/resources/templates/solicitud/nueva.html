<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head('Solicitar servicio')}"></head>
<body>
<header th:replace="~{fragmentos :: header}"></header>
<div th:replace="~{fragmentos :: mensajes}"></div>
<main class="container my-5">
    <h1 class="h3 fw-bold text-primary-hs mb-4">Solicitar servicio</h1>
    <div class="row g-4">
        <section class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form th:action="@{/solicitudes/guardar}" th:object="${solicitud}" method="post" class="row g-3">
                        <input type="hidden" th:field="*{servicio.idServicio}"/>
                        <div class="col-md-6">
                            <label class="form-label">Fecha</label>
                            <input th:field="*{fechaServicio}" type="date" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hora</label>
                            <input th:field="*{horaServicio}" type="time" class="form-control" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Dirección</label>
                            <input th:field="*{direccion}" class="form-control" placeholder="Provincia, cantón, distrito y señas" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripción del trabajo</label>
                            <textarea th:field="*{descripcionTrabajo}" class="form-control" rows="5" placeholder="Explique brevemente qué necesita" required></textarea>
                        </div>
                        <div class="col-12 d-flex justify-content-end gap-2">
                            <a class="btn btn-outline-secondary" th:href="@{/servicios/resultados}">Cancelar</a>
                            <button class="btn btn-primary-hs" type="submit">Confirmar solicitud</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        <aside class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <h2 class="h5 fw-bold text-primary-hs">Resumen</h2>
                    <p class="mb-1 text-muted">Servicio</p>
                    <p class="fw-bold" th:text="${servicio.nombre}">Servicio</p>
                    <p class="mb-1 text-muted">Proveedor</p>
                    <p class="fw-bold" th:text="${servicio.proveedor.nombre}">Proveedor</p>
                    <p class="mb-1 text-muted">Tarifa estimada</p>
                    <p class="fw-bold text-primary-hs" th:text="'Desde ₡' + ${servicio.precioReferencia}">Desde ₡20000</p>
                    <span class="badge bg-warning text-dark">Pendiente</span>
                </div>
            </div>
        </aside>
    </div>
</main>
<footer th:replace="~{fragmentos :: footer}"></footer>
</body>
</html>
