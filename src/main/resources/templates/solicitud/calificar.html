<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head('Calificar proveedor')}"></head>
<body>
<header th:replace="~{fragmentos :: header}"></header>
<div th:replace="~{fragmentos :: mensajes}"></div>
<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow rounded-4">
                <div class="card-body p-4">
                    <h1 class="h3 fw-bold text-primary-hs mb-3">Calificar proveedor</h1>
                    <p class="text-muted">Esta calificación queda vinculada a una solicitud registrada.</p>
                    <form th:action="@{/solicitudes/calificar}" th:object="${calificacion}" method="post" class="row g-3">
                        <input type="hidden" th:field="*{solicitud.idSolicitud}"/>
                        <div class="col-md-4">
                            <label class="form-label">Puntaje</label>
                            <select th:field="*{puntaje}" class="form-select" required>
                                <option value="5">5 - Excelente</option>
                                <option value="4">4 - Muy bueno</option>
                                <option value="3">3 - Bueno</option>
                                <option value="2">2 - Regular</option>
                                <option value="1">1 - Deficiente</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Comentario</label>
                            <textarea th:field="*{comentario}" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="col-12 text-end">
                            <button class="btn btn-primary-hs" type="submit">Publicar calificación</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragmentos :: footer}"></footer>
</body>
</html>
