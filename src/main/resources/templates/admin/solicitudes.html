<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{fragmentos :: head('Solicitudes registrados')}"></head>
    <body>
        <header th:replace="~{fragmentos :: header}"></header>
        <div th:replace="~{fragmentos :: mensajes}"></div>
        <main class="container my-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 fw-bold text-primary-hs mb-1">Solicitudes registrados</h1>
                    <p class="text-muted mb-0">Consulta de solicitudes creadas por los clientes.</p>
                </div>
                <a class="btn btn-primary-hs" th:href="@{/admin/panel}">Volver al panel</a>
            </div>
            <section class="mt-5" id="solicitudes">
                <h2 class="h5 fw-bold text-primary-hs">Usuarios registrados</h2>
                <div class="table-responsive card border-0 shadow-sm rounded-4 p-3">
                    <table class="table align-middle mb-0">
                        <thead><tr><th>Id</th><th>Cliente</th><th>Proveedor</th><th>Servicio</th><th>Fecha</th><th>Hora</th><th>Estado</th><th>Dirreción</th><th>Descripción</th></tr></thead>
                        <tbody>
                            <tr th:each="solicitud : ${solicitudes}">

                                <td th:text="${solicitud.idSolicitud}">1</td>

                                <td th:text="${solicitud.cliente.nombreCompleto}">
                                    Cliente
                                </td>

                                <td th:text="${solicitud.proveedor.nombre}">
                                    Proveedor
                                </td>

                                <td th:text="${solicitud.servicio.nombre}">
                                    Servicio
                                </td>

                                <td th:text="${solicitud.fechaServicio}">
                                    Fecha
                                </td>

                                <td th:text="${solicitud.horaServicio}">
                                    Hora
                                </td>

                                <td>
                                    <span class="badge bg-primary"
                                          th:text="${solicitud.estado}">
                                        Estado
                                    </span>
                                </td>

                                <td th:text="${solicitud.direccion}">
                                    Dirección
                                </td>

                                <td th:text="${solicitud.descripcionTrabajo}">
                                    Descripción
                                </td>

                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <footer th:replace="~{fragmentos :: footer}"></footer>
    </body>
</html>
